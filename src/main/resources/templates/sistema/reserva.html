<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reservar Cita - Salud y Vida</title>
    <link rel="stylesheet" th:href="@{/css/style-sistema.css}">
</head>
<body>

<aside th:replace="~{sistema/sidebar :: sidebar('reserva')}"></aside>

<main class="main-content">
    <div class="card">
        <h1>Registro de Cita Médica</h1>

        <div th:if="${exito}" class="alerta alerta-exito" th:text="${exito}"></div>

        <form th:action="@{/citas/reserva/guardar}" th:object="${cita}" method="post">

            <div class="form-grid-sistema">
                <div class="form-group">
                    <label>DNI Paciente:</label>
                    <input type="text" th:field="*{dniPaciente}" placeholder="Ingrese DNI...">
                </div>
                <div class="form-group">
                    <label>Nombre Paciente:</label>
                    <input type="text" th:field="*{paciente}" placeholder="Nombre completo">
                </div>
                <div class="form-group">
                    <label>Especialidad:</label>
                    <select>
                        <option th:each="e : ${especialidades}"
                                th:value="${e.nombre}"
                                th:text="${e.nombre}"></option>
                    </select>
                </div>
            </div>

            <div class="form-grid-sistema">
                <div class="form-group">
                    <label>Médico:</label>
                    <select th:field="*{medico}">
                        <option th:each="m : ${medicos}"
                                th:value="${m.nombre}"
                                th:text="${m.nombre}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Fecha y Hora:</label>
                    <input type="datetime-local" th:field="*{fechaHora}">
                </div>
                <div class="form-group">
                    <label>Prioridad:</label>
                    <select th:field="*{prioridad}">
                        <option value="Normal">Normal</option>
                        <option value="Urgente">Urgente</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-success">✅ Confirmar Reserva</button>
        </form>

    </div>
</main>
</body>
</html>
