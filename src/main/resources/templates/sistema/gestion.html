<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Citas - Salud y Vida</title>
    <link rel="stylesheet" th:href="@{/css/style-sistema.css}">
</head>
<body>

<aside th:replace="~{sistema/sidebar :: sidebar('gestion')}"></aside>

<main class="main-content">
    <section class="section">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h1>Gestión de Citas Programadas</h1>
                <a th:href="@{/citas/reserva}" class="btn btn-primary" style="text-decoration:none;">+ Nueva Cita</a>
            </div>

            <div th:if="${exito}" class="alerta alerta-exito" th:text="${exito}"></div>

            <!-- FORMULARIO EDICIÓN (solo en modo edición) -->
            <div th:if="${modoEdicion}" class="card" style="background:#f9f9f9; margin-bottom:20px;">
                <h3 style="margin-top:0;">Editar Cita</h3>
                <form th:action="@{/citas/gestion/actualizar}" th:object="${cita}" method="post">
                    <input type="hidden" th:field="*{id}">
                    <div class="form-grid-sistema">
                        <div class="form-group">
                            <label>Paciente:</label>
                            <input type="text" th:field="*{paciente}">
                        </div>
                        <div class="form-group">
                            <label>Médico:</label>
                            <select th:field="*{medico}">
                                <option th:each="m : ${medicos}"
                                        th:value="${m.nombre}"
                                        th:text="${m.nombre}"></option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Fecha/Hora:</label>
                            <input type="text" th:field="*{fechaHora}">
                        </div>
                        <div class="form-group">
                            <label>Estado:</label>
                            <select th:field="*{estado}">
                                <option value="Confirmado">Confirmado</option>
                                <option value="Pendiente">Pendiente</option>
                                <option value="Cancelado">Cancelado</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success">Guardar Cambios</button>
                    <a th:href="@{/citas/gestion}" class="btn btn-edit" style="margin-left:8px;">Cancelar</a>
                </form>
            </div>

            <!-- BOTÓN que revela la tabla -->
            <form th:action="@{/citas/gestion/buscar}" method="post">
                <button type="submit" class="btn btn-primary">🔍 Consultar Citas Programadas</button>
            </form>

            <!-- TABLA (solo si mostrarTabla = true) -->
            <div th:if="${mostrarTabla}" class="tabla-animada" style="margin-top:25px;">
                <table>
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>DNI</th>
                        <th>Paciente</th>
                        <th>Médico</th>
                        <th>Fecha/Hora</th>
                        <th>Prioridad</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c : ${citas}">
                        <td th:text="${c.id}"></td>
                        <td th:text="${c.dniPaciente}"></td>
                        <td th:text="${c.paciente}"></td>
                        <td th:text="${c.medico}"></td>
                        <td th:text="${c.fechaHora}"></td>
                        <td th:text="${c.prioridad}"></td>
                        <td>
                            <span th:text="${c.estado}"
                                  th:classappend="${c.estado == 'Confirmado'} ? 'status confirmado' :
                                                  (${c.estado == 'Pendiente'} ? 'status pendiente' : 'status cancelado')"
                                  class="status"></span>
                        </td>
                        <td>
                            <a th:href="@{/citas/gestion/editar/{id}(id=${c.id})}" class="btn btn-edit">Editar</a>
                            <a th:href="@{/citas/gestion/eliminar/{id}(id=${c.id})}"
                               class="btn btn-delete"
                               onclick="return confirm('¿Eliminar esta cita?')">X</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(citas)}">
                        <td colspan="8" style="text-align:center; color:#999;">No hay citas programadas.</td>
                    </tr>
                    </tbody>
                </table>

                <div style="margin-top:20px; padding-top:15px; border-top:1px solid #eee;">
                    <small style="color:#666;">Sede: <strong>Huancayo Centro</strong></small>
                </div>
            </div>

        </div>
    </section>
</main>

</body>
</html>
