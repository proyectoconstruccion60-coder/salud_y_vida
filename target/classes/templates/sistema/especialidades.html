<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Especialidades - Salud y Vida</title>
    <link rel="stylesheet" th:href="@{/css/style-sistema.css}">
</head>
<body>

<aside th:replace="~{sistema/sidebar :: sidebar('especialidades')}"></aside>

<main class="main-content">
    <div class="card">
        <h1>Mantenimiento de Especialidades</h1>

        <div th:if="${exito}" class="alerta alerta-exito" th:text="${exito}"></div>

        <form th:action="${modoEdicion} ? @{/especialidades/actualizar} : @{/especialidades/guardar}"
              th:object="${especialidad}" method="post">

            <input type="hidden" th:if="${modoEdicion}" th:field="*{id}">

            <div class="form-grid-sistema">
                <div class="form-group">
                    <label>Nombre de Especialidad:</label>
                    <input type="text" th:field="*{nombre}" placeholder="Ej. Ginecología">
                </div>
                <div class="form-group">
                    <label>Descripción:</label>
                    <input type="text" th:field="*{descripcion}" placeholder="Descripción breve">
                </div>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn btn-success"
                        th:text="${modoEdicion} ? 'Actualizar' : 'Agregar Especialidad'"></button>
                <a th:if="${modoEdicion}" th:href="@{/especialidades}" class="btn btn-edit">Cancelar</a>
            </div>
        </form>

        <!-- BOTÓN que revela la tabla -->
        <div style="margin-top: 25px;">
            <form th:action="@{/especialidades/buscar}" method="post">
                <button type="submit" class="btn btn-primary">🔍 Ver Especialidades</button>
            </form>
        </div>

        <!-- TABLA -->
        <div th:if="${mostrarTabla}" class="tabla-animada">
            <h2 style="margin-top:30px; color:var(--primary); border-left:4px solid var(--secondary); padding-left:12px;">
                Especialidades Registradas
            </h2>
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="e : ${especialidades}">
                    <td th:text="${e.id}"></td>
                    <td th:text="${e.nombre}"></td>
                    <td th:text="${e.descripcion}"></td>
                    <td>
                        <a th:href="@{/especialidades/editar/{id}(id=${e.id})}" class="btn btn-edit">Editar</a>
                        <a th:href="@{/especialidades/eliminar/{id}(id=${e.id})}"
                           class="btn btn-delete"
                           onclick="return confirm('¿Eliminar esta especialidad?')">X</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</main>
</body>
</html>
